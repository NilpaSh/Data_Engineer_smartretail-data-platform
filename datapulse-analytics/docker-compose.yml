version: "3.9"

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.7.3-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    _AIRFLOW_DB_UPGRADE: 'true'
    _AIRFLOW_WWW_USER_CREATE: 'true'
    _AIRFLOW_WWW_USER_USERNAME: admin
    _AIRFLOW_WWW_USER_PASSWORD: admin
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - .:/opt/airflow/project
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ─────────────────────────────────────────
  # PostgreSQL — Data Warehouse + Airflow DB
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: datapulse_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapulse123}
      POSTGRES_DB: ${POSTGRES_DB:-retail_dw}
      POSTGRES_MULTIPLE_DATABASES: retail_dw,airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/create_airflow_db.sh:/docker-entrypoint-initdb.d/00_create_airflow_db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datapulse} -d ${POSTGRES_DB:-retail_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Streamlit — Analytics Dashboard
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: datapulse_dashboard
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-retail_dw}
      DB_USER: ${POSTGRES_USER:-datapulse}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-datapulse123}
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run /app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

  # ─────────────────────────────────────────
  # Airflow — Orchestration (optional profile)
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    profiles: ["airflow"]
    container_name: datapulse_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@datapulse.com \
          --password admin

  airflow-webserver:
    <<: *airflow-common
    profiles: ["airflow"]
    container_name: datapulse_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    profiles: ["airflow"]
    container_name: datapulse_airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  postgres_data:
    driver: local

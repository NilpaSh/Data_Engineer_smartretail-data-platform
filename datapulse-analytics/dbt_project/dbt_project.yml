name: 'datapulse'
version: '1.0.0'
config-version: 2

profile: 'datapulse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Lookback window for incremental models
  start_date: "2023-01-01"

models:
  datapulse:
    staging:
      +schema: silver
      +materialized: view

    intermediate:
      +schema: silver
      +materialized: view
      +tags: ["intermediate"]

    marts:
      core:
        +schema: gold
        +materialized: table
        +tags: ["core", "daily"]
      marketing:
        +schema: gold
        +materialized: table
        +tags: ["marketing", "daily"]
